services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: vv1ldd/meanly-marketplace:latest
    expose:
      - "8080"
    environment:
      APP_NAME: ${APP_NAME:-Meanly}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_TIMEZONE: ${APP_TIMEZONE:-UTC}
      APP_URL: ${APP_URL}
      APP_DOMAIN: ${APP_DOMAIN}
      APP_PRODUCTION_DOMAIN: ${APP_PRODUCTION_DOMAIN:-meanly.one}
      APP_PUBLIC_DOMAINS: ${APP_PUBLIC_DOMAINS}
      ASSET_URL: ${ASSET_URL}
      APP_LOCALE: ${APP_LOCALE:-en}
      APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-en}
      APP_SUPPORTED_LOCALES: ${APP_SUPPORTED_LOCALES:-en,ru,es,ka}
      APP_FAKER_LOCALE: ${APP_FAKER_LOCALE:-en_US}
      MARKET_DEFAULT: ${MARKET_DEFAULT:-global}
      MARKET_GLOBAL_DOMAINS: ${MARKET_GLOBAL_DOMAINS:-meanly.one,www.meanly.one,meanly.test}
      MARKET_LATAM_AR_DOMAINS: ${MARKET_LATAM_AR_DOMAINS:-meanly.ar,digitienda.ar,www.digitienda.ar}
      MARKET_RU_DOMAINS: ${MARKET_RU_DOMAINS:-meanly.ru,www.meanly.ru}
      MARKET_GE_DOMAINS: ${MARKET_GE_DOMAINS:-tsipruli.ge,www.tsipruli.ge}
      APP_MAINTENANCE_DRIVER: ${APP_MAINTENANCE_DRIVER:-file}
      PHP_CLI_SERVER_WORKERS: ${PHP_CLI_SERVER_WORKERS:-4}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_STACK: ${LOG_STACK:-daily}
      LOG_DEPRECATIONS_CHANNEL: ${LOG_DEPRECATIONS_CHANNEL:-null}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST_PS_PLUS: ${DB_HOST_PS_PLUS}
      DB_PORT_PS_PLUS: ${DB_PORT_PS_PLUS:-3306}
      DB_DATABASE_PS_PLUS: ${DB_DATABASE_PS_PLUS}
      DB_USERNAME_PS_PLUS: ${DB_USERNAME_PS_PLUS}
      DB_PASSWORD_PS_PLUS: ${DB_PASSWORD_PS_PLUS}
      DB_HOST_PS_STORE: ${DB_HOST_PS_STORE}
      DB_PORT_PS_STORE: ${DB_PORT_PS_STORE:-3306}
      DB_DATABASE_PS_STORE: ${DB_DATABASE_PS_STORE}
      DB_USERNAME_PS_STORE: ${DB_USERNAME_PS_STORE}
      DB_PASSWORD_PS_STORE: ${DB_PASSWORD_PS_STORE}
      DB_HOST_1GROS_PROD: ${DB_HOST_1GROS_PROD}
      DB_PORT_1GROS_PROD: ${DB_PORT_1GROS_PROD:-3306}
      DB_DATABASE_1GROS_PROD: ${DB_DATABASE_1GROS_PROD}
      DB_USERNAME_1GROS_PROD: ${DB_USERNAME_1GROS_PROD}
      DB_PASSWORD_1GROS_PROD: ${DB_PASSWORD_1GROS_PROD}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
      SESSION_ENCRYPT: ${SESSION_ENCRYPT:-false}
      SESSION_PATH: ${SESSION_PATH:-/}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-null}
      BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-log}
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
      MEMCACHED_HOST: ${MEMCACHED_HOST:-127.0.0.1}
      REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
      REDIS_HOST: ${REDIS_HOST:-127.0.0.1}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      REDIS_PORT: ${REDIS_PORT:-6379}
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_BUCKET: ${AWS_BUCKET}
      AWS_USE_PATH_STYLE_ENDPOINT: ${AWS_USE_PATH_STYLE_ENDPOINT:-false}
      VITE_APP_NAME: ${VITE_APP_NAME}
      YM_API_KEY: ${YM_API_KEY}
      YM_BUSINESS_ID: ${YM_BUSINESS_ID}
      YM_CATEGORY_ID: ${YM_CATEGORY_ID}
      YM_NOTIFICATION_TOKEN: ${YM_NOTIFICATION_TOKEN}
      PS_TAX: ${PS_TAX:-35}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS}
      TG_TOKEN: ${TG_TOKEN}
      TG_CHAT_ID: ${TG_CHAT_ID}
      GOOGLE_TRANSLATE_API_KEY: ${GOOGLE_TRANSLATE_API_KEY}
      APP_WILDFLOW_URL: ${APP_WILDFLOW_URL:-https://meanly.one/api/v1/}
      WILDFLOW_KERNEL_MODE: ${WILDFLOW_KERNEL_MODE:-local}
      WILDFLOW_FINANCIAL_SECRET: ${WILDFLOW_FINANCIAL_SECRET}
      WILDFLOW_VERIFY_TLS: ${WILDFLOW_VERIFY_TLS:-true}
      SIMPLE_L1_IDENTITY_PROVIDER_URL: ${SIMPLE_L1_IDENTITY_PROVIDER_URL:-https://meanly.test}
      SIMPLE_L1_RUNTIME_URL: ${SIMPLE_L1_RUNTIME_URL:-http://localhost:3000}
      SIMPLE_L1_PROTOCOL_GATEWAY_URL: ${SIMPLE_L1_PROTOCOL_GATEWAY_URL:-https://meanly.test}
      SIMPLE_L1_PROOF_INTROSPECTION_PATH: ${SIMPLE_L1_PROOF_INTROSPECTION_PATH:-/api/sl1e/proofs/introspect}
      SIMPLE_L1_CLIENT_ID: ${SIMPLE_L1_CLIENT_ID:-meanly.test}
      SIMPLE_L1_CLIENT_NAME: ${SIMPLE_L1_CLIENT_NAME:-Meanly}
      SIMPLE_L1_UI_THEME: ${SIMPLE_L1_UI_THEME:-neobrutalism}
      SIMPLE_L1_VERIFY_TLS: ${SIMPLE_L1_VERIFY_TLS:-true}
      STOREFRONT_ALLOWED_ORIGINS: ${STOREFRONT_ALLOWED_ORIGINS:-}
      STOREFRONT_TOKEN_TTL_SECONDS: ${STOREFRONT_TOKEN_TTL_SECONDS:-900}
      STOREFRONT_TOKEN_ISSUER: ${STOREFRONT_TOKEN_ISSUER:-meanly-storefront}
      STOREFRONT_TOKEN_AUDIENCE: ${STOREFRONT_TOKEN_AUDIENCE:-regional-frontends}
      GOOGLE_SEARCH_CONSOLE_SITE_URL: ${GOOGLE_SEARCH_CONSOLE_SITE_URL}
      GOOGLE_SEARCH_CONSOLE_ACCESS_TOKEN: ${GOOGLE_SEARCH_CONSOLE_ACCESS_TOKEN}
      YANDEX_WEBMASTER_OAUTH_TOKEN: ${YANDEX_WEBMASTER_OAUTH_TOKEN}
      YANDEX_WEBMASTER_USER_ID: ${YANDEX_WEBMASTER_USER_ID}
      YANDEX_WEBMASTER_HOST_ID: ${YANDEX_WEBMASTER_HOST_ID}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4}
      OLLAMA_URL: ${OLLAMA_URL:-http://localhost:11434}
      LLM_PROVIDER: ${LLM_PROVIDER:-local}
      LLM_FALLBACK_PROVIDERS: ${LLM_FALLBACK_PROVIDERS:-openai,anthropic,local}
      LLM_CLOUD_REQUIRED: ${LLM_CLOUD_REQUIRED:-false}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-60}
      LLM_REDACT_PROMPTS: ${LLM_REDACT_PROMPTS:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_ORGANIZATION: ${OPENAI_ORGANIZATION}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-haiku-latest}
      ANTHROPIC_VERSION: ${ANTHROPIC_VERSION:-2023-06-01}
    networks:
      - coolify

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: vv1ldd/meanly-storefront-frontend:latest
    expose:
      - "3000"
    environment:
      NODE_ENV: ${FRONTEND_NODE_ENV:-production}
      PORT: ${FRONTEND_PORT:-3000}
      NEXT_PUBLIC_MARKETPLACE_API_URL: ${NEXT_PUBLIC_MARKETPLACE_API_URL:-https://api.meanly.test}
      NEXT_PUBLIC_MARKETPLACE_REGION: ${NEXT_PUBLIC_MARKETPLACE_REGION:-global}
      NEXT_PUBLIC_SIMPLE_L1_URL: ${NEXT_PUBLIC_SIMPLE_L1_URL:-https://meanly.test}
    networks:
      - coolify

networks:
  coolify:
    external: true
