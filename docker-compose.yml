services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: w1ld-resonation/1gros:latest
    expose:
      - "8080"
    environment:
      APP_NAME: ${APP_NAME:-"1GROS ADM"}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Moscow}
      APP_URL: ${APP_URL}
      APP_DOMAIN: ${APP_DOMAIN}
      APP_PUBLIC_DOMAINS: ${APP_PUBLIC_DOMAINS}
      ASSET_URL: ${ASSET_URL}
      APP_LOCALE: ${APP_LOCALE:-ru}
      APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-en}
      APP_FAKER_LOCALE: ${APP_FAKER_LOCALE:-ru_RU}
      APP_MAINTENANCE_DRIVER: ${APP_MAINTENANCE_DRIVER:-file}
      PHP_CLI_SERVER_WORKERS: ${PHP_CLI_SERVER_WORKERS:-4}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_STACK: ${LOG_STACK:-daily}
      LOG_DEPRECATIONS_CHANNEL: ${LOG_DEPRECATIONS_CHANNEL:-null}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST_PS_PLUS: ${DB_HOST_PS_PLUS}
      DB_PORT_PS_PLUS: ${DB_PORT_PS_PLUS:-3306}
      DB_DATABASE_PS_PLUS: ${DB_DATABASE_PS_PLUS}
      DB_USERNAME_PS_PLUS: ${DB_USERNAME_PS_PLUS}
      DB_PASSWORD_PS_PLUS: ${DB_PASSWORD_PS_PLUS}
      DB_HOST_PS_STORE: ${DB_HOST_PS_STORE}
      DB_PORT_PS_STORE: ${DB_PORT_PS_STORE:-3306}
      DB_DATABASE_PS_STORE: ${DB_DATABASE_PS_STORE}
      DB_USERNAME_PS_STORE: ${DB_USERNAME_PS_STORE}
      DB_PASSWORD_PS_STORE: ${DB_PASSWORD_PS_STORE}
      DB_HOST_1GROS_PROD: ${DB_HOST_1GROS_PROD}
      DB_PORT_1GROS_PROD: ${DB_PORT_1GROS_PROD:-3306}
      DB_DATABASE_1GROS_PROD: ${DB_DATABASE_1GROS_PROD}
      DB_USERNAME_1GROS_PROD: ${DB_USERNAME_1GROS_PROD}
      DB_PASSWORD_1GROS_PROD: ${DB_PASSWORD_1GROS_PROD}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
      SESSION_ENCRYPT: ${SESSION_ENCRYPT:-false}
      SESSION_PATH: ${SESSION_PATH:-/}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-null}
      BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-log}
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
      MEMCACHED_HOST: ${MEMCACHED_HOST:-127.0.0.1}
      REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
      REDIS_HOST: ${REDIS_HOST:-127.0.0.1}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      REDIS_PORT: ${REDIS_PORT:-6379}
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_BUCKET: ${AWS_BUCKET}
      AWS_USE_PATH_STYLE_ENDPOINT: ${AWS_USE_PATH_STYLE_ENDPOINT:-false}
      VITE_APP_NAME: ${VITE_APP_NAME}
      YM_API_KEY: ${YM_API_KEY}
      YM_BUSINESS_ID: ${YM_BUSINESS_ID}
      YM_CATEGORY_ID: ${YM_CATEGORY_ID}
      YM_NOTIFICATION_TOKEN: ${YM_NOTIFICATION_TOKEN}
      PS_TAX: ${PS_TAX:-35}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS}
      TG_TOKEN: ${TG_TOKEN}
      TG_CHAT_ID: ${TG_CHAT_ID}
      GOOGLE_TRANSLATE_API_KEY: ${GOOGLE_TRANSLATE_API_KEY}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4}
      OLLAMA_URL: ${OLLAMA_URL:-http://localhost:11434}
      LLM_PROVIDER: ${LLM_PROVIDER:-local}
      LLM_FALLBACK_PROVIDERS: ${LLM_FALLBACK_PROVIDERS:-openai,anthropic,local}
      LLM_CLOUD_REQUIRED: ${LLM_CLOUD_REQUIRED:-false}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-60}
      LLM_REDACT_PROMPTS: ${LLM_REDACT_PROMPTS:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_ORGANIZATION: ${OPENAI_ORGANIZATION}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.anthropic.com}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-3-5-haiku-latest}
      ANTHROPIC_VERSION: ${ANTHROPIC_VERSION:-2023-06-01}
    networks:
      - coolify

networks:
  coolify:
    external: true
