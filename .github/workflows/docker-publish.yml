name: Build and Publish Marketplace API Image

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare application env
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Build assets
        run: npm run build

      - name: Run Phase 4 deploy pipeline tests
        run: |
          php artisan test \
            tests/Feature/MeanlyProductionReadinessDeployGateTest.php \
            tests/Feature/DgsSplitModeFulfillmentTest.php \
            tests/Unit/SupplyContourTest.php \
            tests/Unit/DgsFulfillmentPayloadBuilderTest.php \
            tests/Unit/DockerBaseImagePinTest.php

  publish:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=sha,prefix=

      - name: Build and push API image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_REF=${{ github.ref_name }}

      - name: Publish immutable deploy coordinates
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "## Immutable deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image tag (short SHA): \`${SHORT_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pull: \`docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Digest: \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Coolify/prod: pin compose to \`ghcr.io/vv1ldd/marketplace:${SHORT_SHA}\` (never \`:latest\`)" >> "$GITHUB_STEP_SUMMARY"
